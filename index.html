    <!-- Automatic Production Cache Buster & SW Purger -->
    <script>
      (function() {
        const CURRENT_BUILD_VERSION = "TVRS_BUILD_2026_06_07_V1";
        const storedVersion = localStorage.getItem("tvrs_build_version");
        if (storedVersion !== CURRENT_BUILD_VERSION) {
          console.warn("🧹 [Cache Buster] New system version detected! Cleared stale client caches & registered service workers.");
          
          // Clear caches
          if ('caches' in window) {
            caches.keys().then(function(names) {
              for (let name of names) {
                caches.delete(name);
              }
            });
          }
          
          // Unregister old Service Workers
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              for (let registration of registrations) {
                registration.unregister();
              }
            });
          }
          
          // Save new version tag
          localStorage.setItem("tvrs_build_version", CURRENT_BUILD_VERSION);
          
          // Hard reload the browser node to fetch fresh assets
          setTimeout(function() {
            window.location.reload(true);
          }, 250);
        }
      })();
    </script>
